name: Release

on:
  pull_request:
  push:
    branches:
      - codex/**
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos-aarch64
            binary: osciris-node
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary: osciris-node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary: osciris-node.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify packaged legal files
        shell: bash
        run: |
          set -euo pipefail
          for crate in osciris-chain osciris-cli osciris-core osciris-daemon osciris-node osciris-verifier; do
            cmp LICENSE "crates/${crate}/LICENSE"
            cmp NOTICE "crates/${crate}/NOTICE"
          done

      - name: Build release binary
        run: cargo build --locked --release -p osciris-cli --bin osciris-node --target ${{ matrix.target }}

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-binaries
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "release-binaries/${{ matrix.binary }}"
          cp LICENSE NOTICE release-binaries/

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release-binaries/

  desktop-installers:
    name: Desktop installers ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: desktop-macos-aarch64
            update_platform: darwin-aarch64
          - os: ubuntu-latest
            platform: desktop-linux-x86_64
            update_platform: linux-x86_64
          - os: windows-latest
            platform: desktop-windows-x86_64
            update_platform: windows-x86_64

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
        working-directory: .

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: pnpm tauri build

      - name: Build signed desktop updater
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --config src-tauri/tauri.updater.conf.json

      - name: Stage signed updater assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: >-
          node scripts/stage-updater-assets.mjs
          --platform ${{ matrix.update_platform }}
          --bundle-root src-tauri/target/release/bundle
          --output update-assets

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/update-assets/*

  release:
    name: Publish GitHub Release
    needs:
      - build
      - desktop-installers
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: release-binaries

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash scripts/package_beta_release.sh \
            --version "$version" \
            --channel beta \
            --release-page-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --release-notes "OSCIRIS Developer Beta ${GITHUB_REF_NAME}" \
            --base-download-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --asset "macos-aarch64=${PWD}/release-binaries/macos-aarch64/osciris-node" \
            --asset "linux-x86_64=${PWD}/release-binaries/linux-x86_64/osciris-node" \
            --asset "windows-x86_64=${PWD}/release-binaries/windows-x86_64/osciris-node.exe"

      - name: Generate signed desktop update manifest
        run: >-
          node scripts/generate_desktop_update_manifest.mjs
          --version "${GITHUB_REF_NAME#v}"
          --tag "$GITHUB_REF_NAME"
          --repository "$GITHUB_REPOSITORY"
          --input release-binaries
          --output dist/desktop-update
          --tauri-config apps/desktop/src-tauri/tauri.conf.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          prerelease: false
          files: |
            dist/beta-release/osciris-node-macos-aarch64.tar.gz
            dist/beta-release/osciris-node-linux-x86_64.tar.gz
            dist/beta-release/osciris-node-windows-x86_64.zip
            dist/beta-release/beta-release-manifest.json
            release-binaries/desktop-macos-aarch64/**/*.dmg
            release-binaries/desktop-linux-x86_64/**/*.deb
            release-binaries/desktop-linux-x86_64/**/*.AppImage
            release-binaries/desktop-windows-x86_64/**/*.msi
            release-binaries/desktop-windows-x86_64/**/*.exe
            dist/desktop-update/osciris-node-darwin-aarch64.app.tar.gz
            dist/desktop-update/osciris-node-linux-x86_64.AppImage
            dist/desktop-update/osciris-node-windows-x86_64-setup.exe
            dist/desktop-update/latest.json
