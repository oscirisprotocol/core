name: Desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/desktop/**"
      - "crates/osciris-daemon/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/desktop/**"
      - "crates/osciris-daemon/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS arm64
          - os: ubuntu-latest
            platform: Linux x64
          - os: windows-latest
            platform: Windows x64

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
        working-directory: .

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Test daemon
        run: cargo test --locked -p osciris-daemon
        working-directory: .

      - name: Build frontend
        run: pnpm build

      - name: Prepare native daemon sidecar
        run: pnpm prepare:sidecar:debug

      - name: Check Tauri bridge
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
